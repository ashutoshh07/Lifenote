<div class="page-content">
  <header class="page-header">
    <div class="page-header-content">
      <h1>Pomodoro</h1>
      <p>Focus sessions and breaks</p>
    </div>
    <div class="page-header-actions">
      <button type="button" class="btn-add-timer" (click)="addTimer()">
        <lucide-icon name="plus" size="18"></lucide-icon>
        Add timer
      </button>
    </div>
  </header>

  <div class="pomodoro-grid">
    @for (timer of (timers$ | async) ?? []; track timer.id) {
      <div class="timer-card">
        <div class="timer-card-header">
          <span class="timer-label">{{ timer.label }}</span>
          <button type="button" class="btn-remove" (click)="removeTimer(timer.id)" title="Remove timer" [disabled]="((timers$ | async)?.length ?? 0) <= 1">
            <lucide-icon name="trash-2" size="16"></lucide-icon>
          </button>
        </div>
        <div class="timer-types">
          <button type="button" [class.active]="timer.type === 'pomodoro'" (click)="setType(timer.id, 'pomodoro')">
            Pomodoro
          </button>
          <button type="button" [class.active]="timer.type === 'short-break'" (click)="setType(timer.id, 'short-break')">
            Short Break
          </button>
          <button type="button" [class.active]="timer.type === 'long-break'" (click)="setType(timer.id, 'long-break')">
            Long Break
          </button>
        </div>
        <div class="timer-display">{{ formatTime(timer) }}</div>
        <div class="timer-controls">
          <button type="button" class="start-button" [class.running]="timer.running" [disabled]="timer.running" (click)="start(timer.id)">
            {{ timer.running ? 'Running…' : 'Start' }}
          </button>
          <button type="button" class="stop-button" [disabled]="!timer.running" (click)="stop(timer.id)">
            Stop
          </button>
          <button type="button" class="reset-button" (click)="reset(timer.id)">
            Reset
          </button>
        </div>
      </div>
    }
  </div>
</div>
